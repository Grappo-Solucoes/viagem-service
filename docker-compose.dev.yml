services:
  postgres:
    image: postgres:16-alpine
    container_name: planejamento-postgres
    environment:
      POSTGRES_DB: planejamento
      POSTGRES_USER: planejamento
      POSTGRES_PASSWORD: planejamento
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planejamento -d planejamento"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: planejamento-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: planejamento-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: planejamento
      RABBITMQ_DEFAULT_PASS: planejamento
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 5s
      timeout: 3s
      retries: 30


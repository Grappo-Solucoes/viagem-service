spring.application.name=viagem-service

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/planejamento?currentSchema=agendamento}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:planejamento}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:planejamento}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.properties.jakarta.persistence.schema-generation.database.action=none
spring.jpa.properties.hibernate.default_schema=agendamento

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:planejamento}
spring.rabbitmq.password=${RABBITMQ_PASS:planejamento}

viagem-exchange=viagem-exchange
presenca-queue=presenca-queue

management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health,info,prometheus
management.health.readinessstate.enabled=true
management.health.livenessstate.enabled=true
management.health.db.enabled=true

spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER:http://localhost:8080/realms/local}

# Spring DOC
springdoc.api-docs.path=/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.enabled=true

